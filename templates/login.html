{% extends "base.html" %}
{% block content %}
<div class="auth-container">
    <div class="card auth-card">
        <h3 class="text-center mb-4"><i class="bi bi-box-arrow-in-right" style="color:var(--pink-primary)"></i> Login</h3>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" name="email" placeholder="Enter your email" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-pink w-100 mt-2">Login</button>
        </form>
        <p class="text-center mt-3 text-muted">Don't have an account? <a href="{{ url_for('register') }}" style="color:var(--pink-primary)">Register here</a></p>
    </div>
</div>
{% endblock %}

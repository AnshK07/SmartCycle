{% extends "base.html" %}
{% block content %}
<div class="auth-container">
    <div class="card auth-card">
        <h3 class="text-center mb-4"><i class="bi bi-person-plus" style="color:var(--pink-primary)"></i> Register</h3>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" class="form-control" name="username" placeholder="Choose a username" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" name="email" placeholder="Enter your email" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" name="password" placeholder="Create a password" required minlength="6">
            </div>
            <button type="submit" class="btn btn-pink w-100 mt-2">Register</button>
        </form>
        <p class="text-center mt-3 text-muted">Already have an account? <a href="{{ url_for('login') }}" style="color:var(--pink-primary)">Login here</a></p>
    </div>
</div>
{% endblock %}
